<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Piston Test Suite Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
      h1 { margin-top: 0; }
      code { background: #f6f6f6; padding: 2px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Piston API Enterprise Test Suite</h1>
    <p>Generated at <code>2026-05-07T17:56:40Z</code></p>
    <div class="grid">
      <div class="card">
        <h2>Summary</h2>
        <ul>
          <li>Total requests: <b>8000</b></li>
          <li>Success rate: <b>84.51%</b></li>
          <li>p50 latency: <b>13817.5 ms</b></li>
          <li>p95 latency: <b>24553.4 ms</b></li>
          <li>p99 latency: <b>27992.6 ms</b></li>
        </ul>
      </div>
      <div class="card">
        <h2>Error breakdown</h2>
        <canvas id="errChart"></canvas>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <h2>Latency distribution (ms)</h2>
      <canvas id="latChart"></canvas>
    </div>

    <script>
      const errLabels = ["client_timeout", "ClientOSError", "ClientConnectorError"];
      const errValues = [91, 836, 312];
      new Chart(document.getElementById('errChart'), {
        type: 'pie',
        data: { labels: errLabels, datasets: [{ data: errValues }] },
      });

      const latLabels = ["0-250", "250-500", "500-1000", "1000-2000", "2000-5000", "5000-10000", "10000-30000"];
      const latValues = [0, 0, 0, 91, 909, 1399, 4350];
      new Chart(document.getElementById('latChart'), {
        type: 'bar',
        data: { labels: latLabels, datasets: [{ label: 'count', data: latValues }] },
        options: { scales: { y: { beginAtZero: true } } }
      });
    </script>
  </body>
</html>
